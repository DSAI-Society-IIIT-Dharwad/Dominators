# 1. Testing Host Escape (Privileged + HostPath)
apiVersion: v1
kind: Pod
metadata:
  name: ultra-bad-pod
spec:
  containers:
  - name: exploit-container
    image: alpine:latest
    securityContext:
      privileged: true
      runAsUser: 0
    volumeMounts:
    - mountPath: /host
      name: host-root
  volumes:
  - name: host-root
    hostPath:
      path: /
---
# 2. Testing Sensitive Config Exposure
apiVersion: v1
kind: ConfigMap
metadata:
  name: leaky-config
data:
  db_password: "supersecretpassword123"
  api_key: "AKIA-FAKE-KEY-FOR-TESTING"
---
# 3. Testing Public Service Exposure
apiVersion: v1
kind: Service
metadata:
  name: open-service
spec:
  type: NodePort
  selector:
    app: insecure-app
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30007
---
# 4. Testing RBAC Privilege Escalation
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: risky-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: User
  name: "admin-user"
  apiGroup: rbac.authorization.k8s.io
- kind: ServiceAccount
  name: "compromised-sa"
  namespace: default
